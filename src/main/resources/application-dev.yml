spring:
  # 开发环境配置 - 使用 MySQL 数据库

  # 数据源配置 - MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/qing_ledger?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000

  # Redis配置 - 暂时禁用(需要时再启用)
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 1000ms
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

  # RabbitMQ配置 - 暂时禁用
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 1000

  # H2 数据库控制台(已禁用 - 使用MySQL)
  # h2:
  #   console:
  #     enabled: true
  #     path: /h2-console

  # Elasticsearch配置 - 暂时禁用
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 1s
    socket-timeout: 1s

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.qingledger.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Actuator监控配置 - 开发环境禁用非关键健康检查
management:
  health:
    rabbit:
      enabled: false
    elasticsearch:
      enabled: false
    redis:
      enabled: false

logging:
  level:
    com.qingledger: debug
    com.baomidou.mybatisplus: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT配置
jwt:
  secret: qing-ledger-secret-key-at-least-256-bits-long-for-hs256-algorithm-in-production
  access-token-expire: 7200
  refresh-token-expire: 604800
